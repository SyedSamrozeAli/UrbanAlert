<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="public/styles/login-page.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400..800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+Chettan+2:wght@400..800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <title>UrbanAlert</title>
  </head>
  <body>
    <div class="shadow-1"></div>
    <div class="shadow-2"></div>
    <div class="shadow-3"></div>
    <div class="shadow-4"></div>
    <div class="form-container">
      <div class="heading">
        <h1>Urban <br /><span style="visibility: hidden">i</span> Alert</h1>
      </div>
      <h2>Login to to your Account</h2>
      <form action="">
        <div class="input-box">
          <input type="email" name="email" required />
          <label>E-mail</label>
        </div>
        <div class="input-box">
          <input type="password" name="password" required />
          <label>Password</label>
        </div>

        <button type="submit">Login</button>
      </form>
      <div class="social-login">
        <button class="facebook-btn">
          <i class="fab fa-facebook"></i> Login with Facebook
        </button>
        <button class="google-btn">
          <i class="fab fa-google"></i> Login with Gmail
        </button>
      </div>
    </div>
    <div class="side-container"><h2>Report, Resolve, Revitalize</h2></div>
  </body>
</html>
